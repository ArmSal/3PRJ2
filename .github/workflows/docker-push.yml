name: Build and Push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        run: |
          docker build ./backend -t ${{ secrets.DOCKER_USERNAME }}/gaming-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gaming-backend:${{ github.sha }}

      - name: Build and Push Frontend  
        run: |
          docker build ./frontend -t ${{ secrets.DOCKER_USERNAME }}/gaming-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gaming-frontend:${{ github.sha }}
