name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        run: |
          docker build ./backend -t gaming-backend:${{ github.sha }}
          docker tag gaming-backend:${{ github.sha }} gaming-backend:latest

      - name: Build Frontend
        run: |
          docker build ./frontend -t gaming-frontend:${{ github.sha }}
          docker tag gaming-frontend:${{ github.sha }} gaming-frontend:latest

      - name: Test Docker Compose
        run: docker compose config

