stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $DOCKER_IMAGE/backend:$CI_COMMIT_SHA ./backend
    - docker build -t $DOCKER_IMAGE/frontend:$CI_COMMIT_SHA ./frontend
    - docker tag $DOCKER_IMAGE/backend:$CI_COMMIT_SHA $DOCKER_IMAGE/backend:latest
    - docker tag $DOCKER_IMAGE/frontend:$CI_COMMIT_SHA $DOCKER_IMAGE/frontend:latest
  only:
    - main

deploy:
  stage: deploy
  script:
    - echo "Deploy to your VM here - add SSH commands"
    - echo "Or use kubectl apply for Kubernetes bonus"
  only:
    - main
  when: manual
